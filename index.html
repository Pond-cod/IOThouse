<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>⚡ Pond's Smart Home | Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="integrated-header card">
            <div class="header-top">
                <div class="header-titles">
                    <h1>⚡ Pond's Smart Home | Control Panel</h1>
                    <span class="subtitle">All Devices: 15</span>
                </div>
                <div id="connection-status" class="status disconnected">Disconnected</div>
            </div>
        </header>

        <!-- Summary Cards -->
        <section class="summary-section">
            <div class="summary-grid">
                <div class="summary-card card hours-card">
                    <div class="summary-icon">⏰</div>
                    <div class="summary-details">
                        <span class="summary-label">Total Hours</span>
                        <span id="usage-total-hours" class="summary-value">125.40 hrs</span>
                    </div>
                </div>
                <div class="summary-card card cost-card">
                    <div class="summary-icon">฿</div>
                    <div class="summary-details">
                        <span class="summary-label">Total Cost</span>
                        <span id="usage-total-cost" class="summary-value">฿564.30</span>
                    </div>
                </div>
            </div>
            <a href="report.html" class="btn btn-primary btn-full-width">📊 VIEW FULL REPORTS</a>
        </section>

        <!-- Control Section -->
        <main class="zones-grid" id="zones-container">
            <!-- Zone 1: Front Zone -->
            <div class="zone-group">
                <h2 class="zone-title">Zone 1: Front Zone</h2>
                <div class="lights-grid">
                    <label class="switch-card" id="zone1-light1">
                        <input type="checkbox" class="hidden-checkbox" data-zone="1" data-light="1">
                        <div class="switch-content">
                            <span class="switch-icon">💡</span>
                            <span class="switch-label">Front 1<br><small>(หน้าบ้าน)</small></span>
                        </div>
                    </label>
                    <label class="switch-card" id="zone1-light2">
                        <input type="checkbox" class="hidden-checkbox" data-zone="1" data-light="2">
                        <div class="switch-content">
                            <span class="switch-icon">💡</span>
                            <span class="switch-label">Front 2<br><small>(หน้าTV)</small></span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Zone 2: Living Room -->
            <div class="zone-group">
                <h2 class="zone-title">Zone 2: Living Room</h2>
                <div class="lights-grid">
                    <label class="switch-card" id="zone2-light1">
                        <input type="checkbox" class="hidden-checkbox" data-zone="2" data-light="1">
                        <div class="switch-content">
                            <span class="switch-icon">💡</span>
                            <span class="switch-label">Living Room 1<br><small>(หน้าโซฟา)</small></span>
                        </div>
                    </label>
                    <label class="switch-card" id="zone2-light2">
                        <input type="checkbox" class="hidden-checkbox" data-zone="2" data-light="2">
                        <div class="switch-content">
                            <span class="switch-icon">💡</span>
                            <span class="switch-label">Living Room 2<br><small>(โต๊ะอาหาร)</small></span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Zone 3: Bathroom -->
            <div class="zone-group">
                <h2 class="zone-title">Bathroom</h2>
                <div class="lights-grid">
                    <label class="switch-card" id="zone3-light1">
                        <input type="checkbox" class="hidden-checkbox" data-zone="3" data-light="1">
                        <div class="switch-content">
                            <span class="switch-icon">💡</span>
                            <span class="switch-label">Bathroom 1<br><small>(ห้องอาบน้ำ)</small></span>
                        </div>
                    </label>
                </div>
            </div>
            
            <!-- Global Controls -->
            <div class="global-controls-secondary">
                <button id="btn-all-on" class="btn btn-secondary">TURN ALL ON</button>
                <button id="btn-all-off" class="btn btn-secondary">TURN ALL OFF</button>
            </div>
        </main>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">💡</span>
            <span class="nav-label">Devices</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">🎬</span>
            <span class="nav-label">Scenes</span>
        </a>
        <a href="report.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Reports</span>
        </a>
    </nav>

    <!-- Paho MQTT client from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
