<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pond's Smart Home | Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Integrated Header & Summary Panel -->
        <header class="integrated-header">
            <div class="header-top">
                <h1>Pond's Smart Home<br><span class="subtitle">Control Panel</span></h1>
                <div id="connection-status" class="status disconnected">Disconnected</div>
            </div>
            
            <section class="metrics-container">
                <div class="metric-card">
                    <div class="metric-icon">⏱️</div>
                    <div class="metric-details">
                        <span class="metric-label">Total Usage</span>
                        <span id="total-hours-display" class="metric-value">0.00 hrs</span>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon">💰</div>
                    <div class="metric-details">
                        <span class="metric-label">Total Cost</span>
                        <span id="total-cost-display" class="metric-value">0.00 ฿</span>
                    </div>
                </div>
            </section>
        </header>

        <section class="global-controls">
            <a href="report.html" class="btn btn-primary btn-full-width">📊 VIEW FULL REPORTS</a>
        </section>

        <section class="global-controls-secondary">
            <button id="btn-all-on" class="btn btn-secondary">Turn On All</button>
            <button id="btn-all-off" class="btn btn-secondary">Turn Off All</button>
        </section>

        <main class="zones-grid" id="zones-container">
            <!-- FRONT ZONE -->
            <div class="zone-group">
                <h2 class="zone-group-title">FRONT ZONE</h2>
                <div class="lights-container">
                    <div class="light-item" id="zone1-light1">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z1-l1" data-zone="1" data-light="1" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">FRONT 1<br><small>(หน้าบ้าน)</small></span>
                                <div class="light-stats" id="stats-หน้าบ้าน/หน้าTV_หน้าบ้าน">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- LIVING ROOM -->
            <div class="zone-group">
                <h2 class="zone-group-title">LIVING ROOM</h2>
                <div class="lights-container">
                    <div class="light-item" id="zone1-light2">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z1-l2" data-zone="1" data-light="2" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">LIVING 2<br><small>(หน้าTV)</small></span>
                                <div class="light-stats" id="stats-หน้าบ้าน/หน้าTV_หน้าTV">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                    <div class="light-item" id="zone2-light1">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z2-l1" data-zone="2" data-light="1" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">CENTER 1<br><small>(ดวงหน้า)</small></span>
                                <div class="light-stats" id="stats-กลางบ้าน_ดวงหน้า">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                    <div class="light-item" id="zone2-light2">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z2-l2" data-zone="2" data-light="2" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">CENTER 2<br><small>(ดวงหลัง)</small></span>
                                <div class="light-stats" id="stats-กลางบ้าน_ดวงหลัง">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- BATHROOM -->
            <div class="zone-group">
                <h2 class="zone-group-title">BATHROOM</h2>
                <div class="lights-container">
                    <div class="light-item" id="zone3-light1">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z3-l1" data-zone="3" data-light="1" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">BATH 1<br><small>(ห้องอาบ)</small></span>
                                <div class="light-stats" id="stats-ห้องน้ำ_ห้องอาบ">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                    <div class="light-item" id="zone3-light2">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z3-l2" data-zone="3" data-light="2" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">BATH 2<br><small>(ห้องส้วม)</small></span>
                                <div class="light-stats" id="stats-ห้องน้ำ_ห้องส้วม">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- KITCHEN -->
            <div class="zone-group">
                <h2 class="zone-group-title">KITCHEN</h2>
                <div class="lights-container">
                    <div class="light-item" id="zone4-light1">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z4-l1" data-zone="4" data-light="1" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">KITCHEN 1<br><small>(ครัว)</small></span>
                                <div class="light-stats" id="stats-ครัว_ครัว">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- BEDROOM 1 -->
            <div class="zone-group">
                <h2 class="zone-group-title">BEDROOM 1</h2>
                <div class="lights-container">
                    <div class="light-item" id="zone5-light1">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z5-l1" data-zone="5" data-light="1" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">BED 1<br><small>(ห้องแรก)</small></span>
                                <div class="light-stats" id="stats-ห้องแรก_ห้องแรก">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- BEDROOM 2 -->
            <div class="zone-group">
                <h2 class="zone-group-title">BEDROOM 2</h2>
                <div class="lights-container">
                    <div class="light-item" id="zone6-light1">
                        <label class="big-toggle-label">
                            <input type="checkbox" id="toggle-z6-l1" data-zone="6" data-light="1" class="hidden-checkbox">
                            <div class="toggle-content">
                                <span class="icon">💡</span>
                                <span class="label-text">BED 2<br><small>(ห้องกลาง)</small></span>
                                <div class="light-stats" id="stats-ห้องกลาง_ห้องกลาง">0.00 hrs | 0.00 ฿</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Paho MQTT client from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
