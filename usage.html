<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>⚡ Pond's Smart Home | Usage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="integrated-header">
            <div class="header-top">
                <div class="header-titles">
                    <h1>Usage</h1>
                </div>
            </div>
        </header>

        <!-- Summary Cards -->
        <section class="summary-section">
            <div class="summary-grid" style="grid-template-columns: 1fr;">
                <div class="summary-card cost-card">
                    <div class="summary-icon">💰</div>
                    <div class="summary-details">
                        <span class="summary-label">Total Cost</span>
                        <span id="usage-total-cost" class="summary-value">฿0.00</span>
                    </div>
                </div>
                <div class="summary-card hours-card">
                    <div class="summary-icon">⏱️</div>
                    <div class="summary-details">
                        <span class="summary-label">Total Hours</span>
                        <span id="usage-total-hours" class="summary-value">0.00 hrs</span>
                    </div>
                </div>
            </div>
        </section>

        <div class="global-controls-secondary" style="justify-content: center;">
            <button id="refresh-usage-btn" class="btn btn-secondary" style="width: 100%;">
                ↻ REFRESH DATA
            </button>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">💡</span>
            <span class="nav-label">อุปกรณ์</span>
        </a>
        <a href="usage.html" class="nav-item active">
            <span class="nav-icon">⚡</span>
            <span class="nav-label">การใช้งาน</span>
        </a>
        <a href="report.html" class="nav-item">
            <span class="nav-icon">📄</span>
            <span class="nav-label">รายงาน</span>
        </a>
    </nav>

    <!-- Paho MQTT client from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
